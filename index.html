<!DOCTYPE html>
<html lang="ja">
<head>

<!-- ========================================
     ここは「head」。
     ページの設定情報を書く場所です。
     画面そのものではなく、
     タイトルや文字コード、CSSなどを置きます。
======================================== -->
<meta charset="UTF-8">
<title>Lo-fi 作業アプリ</title>  
<meta name="robots" content="noindex">

<!-- ========================================
     ここからCSS
     CSSは「見た目」を決める場所です。
     色、余白、大きさ、配置、アニメーションなどを指定します。
======================================== -->
<style>

  /* ページ全体の見た目 */
  body {
  background: #1e1e2f;
    color: #fff;
    text-align: center;
    font-family: sans-serif;
    padding-top: 50px;
    margin: 0;
  }

  /* すべてのbutton要素の共通デザイン */
  button {
  font-size: 20px;
  padding: 10px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: #6c7ae0;
  color: white;
  cursor: pointer;

  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  transition: background 0.2s ease;
}

  /* ボタンにマウスを乗せたときの色 */
  button:hover {
  background: #5a68c0;
}

  /* ボタンを押した瞬間の色 */
  button:active {
    background: #4a57a8;
  }

  /* 音量スライダーの幅 */
  input[type="range"] {
    width: 200px;
  }

  /* ボタン群とビジュアライザーをまとめる横並びエリア */
  #buttonRow {
  margin: 10px auto 0;
  width: 80%;
  max-width: 600px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
}

  /* 画像とセリフ枠をまとめたエリア */
  #imageArea {
    width: 80%;
    max-width: 600px;
    margin: 20px auto 0;
  }

  /* メイン画像 */
  #mainImage {
    width: 100%;
    display: block;
    border-radius: 10px;
    opacity: 0.95;
    filter: brightness(0.9) contrast(1.1);
  }

  /* セリフ枠 */
  #messageBox {
    margin-top: 10px;
    padding: 16px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    box-sizing: border-box;

  /* セリフ枠の影 */
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
  }

  /* セリフの話者名 */
  #messageName {
    font-size: 14px;
    color: #b8c0ff;
    text-align: left;
    margin-bottom: 8px;
  }

  /* セリフ本文 */
  #message {
    font-size: 20px;
    color: #f2f2f2;
    text-align: left;
    line-height: 1.6;
    min-height: 32px;
  }

  /* 曲名表示 */
  #trackName {
    font-size: 18px;
    margin-top: 20px;
    color: #d6dcff;
  }

  /* タイトル横の日付表示 */
  #dateText {
  font-size: 14px;
  margin-left: 12px;
  color: #d6dcff;
  opacity: 0.7;
  letter-spacing: 0.5px;
}

  /* 音量エリアとタイマー表示を横並びのパネルにする */
  #controlRow {
    width: 80%;
    max-width: 600px;
    margin: 10px auto 0;
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: stretch;
    flex-wrap: wrap;
  }

  /* パネル共通デザイン（音量パネル、作業時間パネル） */
  .panel {
    flex: 1 1 240px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 18px 20px;
    box-sizing: border-box;

  /* パネルの影 */
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
  }

  /* パネルの見出し */
  .panelTitle {
    font-size: 18px;
    margin-bottom: 12px;
    color: #d6dcff;
  }

  /* 「作業時間」「休憩時間」の表示 */
  #mode {
    font-size: 24px;
    margin-top: 0;
    color: #d6dcff;
  }

  /* タイマー本体の数字 */
  #timer {
    font-size: 48px;
    margin-top: 10px;
    font-weight: bold;
  }

  /* タイマー開始ボタンとリセットボタンを並べる箱 */
  #buttonGroup {
  display: flex;
  gap: 10px;
}
  
  /* オーバーレイ通知全体 */
  #noticeOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    padding: 20px;
    box-sizing: border-box;
  }

  /* オーバーレイの中の箱 */
  #noticeBox {
    background: #2b2b44;
    border-radius: 16px;
    padding: 28px 24px;
    width: 90%;
    max-width: 460px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  /* オーバーレイに出る文字 */
  #noticeText {
    font-size: 28px;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  /* ロック画面全体 */
  #lockScreen {
    position: fixed;
    inset: 0;
    background: #1e1e2f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 20px;
    box-sizing: border-box;
  }

  /* ロック画面の見出し */
  #lockScreen h2 {
    margin-bottom: 20px;
    font-size: 28px;
  }

  /* パスワード入力欄 */
  #passwordInput {
    font-size: 18px;
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    width: 260px;
    max-width: 80%;
    box-sizing: border-box;
  }

  /* パスワードエラー表示 */
  #errorMessage {
    color: #ff9b9b;
    margin-top: 12px;
    min-height: 24px;
  }

  /* アプリ本体。最初は非表示 */
  #appContent {
    display: none;
  }

  /* フェードイン用クラス */
  .fade-in {
    animation: fadeIn 1.5s ease-in;
  }

  /* フェードインの動き */
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* =========================
     ビジュアライザー関連
  ========================= */

  /* ボタン行。下の方にも書いてあるが、最終的にはこの指定も効く */
  #buttonRow {
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ボタンを横並びにする */
  #buttonGroup {
    display: flex;
    gap: 10px;
  }

  /* ビジュアライザー本体 */
  #visualizer {
    margin-right: 10px;
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 30px;
  }

  /* 棒1本ごとの見た目 */
  #visualizer span {
    width: 4px;
    height: 6px;
    background: #d6dcff;
    border-radius: 2px;
    animation: bounce 1s infinite ease-in-out;
  }

  /* 棒ごとに開始タイミングを少しずらす */
  #visualizer span:nth-child(1) { animation-delay: 0s; }
  #visualizer span:nth-child(2) { animation-delay: 0.2s; }
  #visualizer span:nth-child(3) { animation-delay: 0.4s; }
  #visualizer span:nth-child(4) { animation-delay: 0.6s; }
  #visualizer span:nth-child(5) { animation-delay: 0.8s; }

  /* 停止中は棒を動かさない */
  #visualizer.paused span {
    animation: none;
    height: 6px;
  }

  /* 棒が伸び縮みする動き */
  @keyframes bounce {
    0%, 100% { height: 6px; }
    50% { height: 28px; }
  }
  
</style>
</head>

<body>

<!-- ========================================
     ここからHTML
     HTMLは「画面に何を置くか」を書く場所です。
     実際の部品を並べています。
======================================== -->

<!-- ロック画面 -->
<div id="lockScreen">
  <h2>🔒 パスワードを入力</h2>
  <input type="password" id="passwordInput" placeholder="Password">
  <br><br>
  <button onclick="checkPassword()">入る</button>
  <div id="errorMessage"></div>
</div>

<!-- 作業終了・休憩終了のオーバーレイ通知 -->
<div id="noticeOverlay">
  <div id="noticeBox">
    <div id="noticeText"></div>
    <button onclick="closeNoticeAndStartNext()">閉じる</button>
  </div>
</div>

<!-- アプリ本体 -->
<div id="appContent">

  <!-- タイトルと日付 -->
  <h1>🎧 Lo-fi 作業アプリ
   <span id="dateText"></span>
  </h1>

  <!-- 画像＋セリフ枠 -->
  <div id="imageArea">
    <img src="image.png" id="mainImage" class="fade-in" alt="ドット絵イラスト">

    <div id="messageBox" class="fade-in">
      <div id="messageName">Girl</div>
      <div id="message"></div>
    </div>
  </div>

  <!-- 音楽本体。srcはJavaScriptで切り替える -->
  <audio id="music"></audio>

  <!-- ベル音。こちらは最初からファイル指定 -->
  <audio id="bell" src="bell.mp3"></audio>

  <!--
    左に音量、右に作業時間と残り時間を置く
  -->
  <div id="controlRow">
    <div class="panel fade-in">
      <div class="panelTitle">音量</div>
      <input type="range" min="0" max="1" step="0.01" value="1"
             oninput="setVolume(this.value)">
      <div id="trackName">現在の曲：未再生</div>
    </div>

    <div class="panel fade-in">
      <div id="mode">作業時間</div>
      <div id="timer">25:00</div>
    </div>
  </div>

  <!-- ボタンとビジュアライザー -->
  <div id="buttonRow">
    <div id="buttonGroup">
     <button id="timerButton" class="fade-in" onclick="toggleTimer()">タイマー開始</button>
     <button class="fade-in" onclick="resetTimer()">リセット</button>
  </div>

    <div id="visualizer" class="paused">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
    
</div>

<!-- ========================================
     ここからJavaScript
     JavaScriptは「動き」を書く場所です。
     ボタンを押した時、音楽再生、タイマー処理などを担当します。
======================================== -->
<script>

  /* パスワード機能を使うかどうかのスイッチ
     true なら使う
     false なら使わない */
  const USE_PASSWORD = false;
  
  /* HTMLの部品をJavaScriptで使えるように取得 */
  const music = document.getElementById("music");
  const bell = document.getElementById("bell");
  const modeDisplay = document.getElementById("mode");
  const timerDisplay = document.getElementById("timer");
  const timerButton = document.getElementById("timerButton");
  const messageDisplay = document.getElementById("message");
  const trackNameDisplay = document.getElementById("trackName");
  const passwordInput = document.getElementById("passwordInput");
  const errorMessage = document.getElementById("errorMessage");
  
  const lockScreen = document.getElementById("lockScreen");
  const appContent = document.getElementById("appContent");

  /* パスワード機能をオフにしている場合は、
     最初からロック画面を消してアプリ本体を出す */
  if (!USE_PASSWORD) {
    lockScreen.style.display = "none";
    appContent.style.display = "block";
  }
  
  const noticeOverlay = document.getElementById("noticeOverlay");
  const noticeText = document.getElementById("noticeText");

  /* 時間設定（秒） */
  const WORK_TIME = 25 * 60;
  const BREAK_TIME = 5 * 60;
  const APP_PASSWORD = "storycat";

  /* 再生する曲一覧 */
  const tracks = [
    "Epoch.mp3",
    "Barely.mp3",
    "Notion.mp3",
    "Reflection.mp3",
    "Woozy.mp3",
    "Cozy.mp3",
    "Fake.mp3",
    "Yawn.mp3",
    "Glass.mp3",
    "Walk.mp3"
  ];

  /* セリフ一覧 */
  const messages = [
    "……雨の音、落ち着くね。",
    "コーヒー、まだ温かい？",
    "焦らなくていいよ。",
    "ゆっくり進めば大丈夫。",
    "ちゃんと頑張ってるね。",
    "あと少しだよ。",
    "無理しないでね。",
    "休憩も大事だよ。",
    "いいペースだね。",
    "……ここで一緒に頑張ろう。"
  ];

  /* タイマーや再生状態を管理する変数 */
  let isRunning = false;
  let isWorkMode = true;
  let remainingTime = WORK_TIME;
  let endTime = null;

  let intervalId = null;
  let messageIntervalId = null;

  let lastMessageIndex = -1;
  let currentTrackIndex = -1;

  /* パスワードチェック */
  function checkPassword() {
    const input = passwordInput.value;

    if (input === APP_PASSWORD) {
      lockScreen.style.display = "none";
      appContent.style.display = "block";
      errorMessage.innerText = "";
    } else {
      errorMessage.innerText = "パスワードが違います";
      passwordInput.value = "";
      passwordInput.focus();
    }
  }

  /* Enterキーでもパスワードを送信できるようにする */
  passwordInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      checkPassword();
    }
  });

  /* 音量調整 */
  function setVolume(v) {
    const volume = Number(v);
    music.volume = volume;
    bell.volume = Math.min(volume, 0.6);
  }

  /* ベル音を鳴らす */
  function playBell() {
    bell.currentTime = 0;
    bell.play().catch(() => {});
  }

  /* タイマー表示を更新する */
  function updateTimerDisplay() {
    const min = Math.floor(remainingTime / 60);
    const sec = remainingTime % 60;
    timerDisplay.innerText = min + ":" + (sec < 10 ? "0" + sec : sec);
  }

  /* 作業時間 / 休憩時間 の表示を切り替える */
  function updateModeDisplay() {
    modeDisplay.innerText = isWorkMode ? "作業時間" : "休憩時間";
  }

  /* オーバーレイ通知を表示する */
  function showNotice(text) {
    noticeText.innerText = text;
    noticeOverlay.style.display = "flex";
  }

  /* オーバーレイを閉じたら、そのまま次のタイマーを開始 */
  function closeNoticeAndStartNext() {
    noticeOverlay.style.display = "none";
    startTimer();
  }

  /* 前回と同じセリフを避けながらランダムに選ぶ */
  function getRandomMessageIndex() {
    if (messages.length === 1) return 0;

    let randomIndex;
    do {
      randomIndex = Math.floor(Math.random() * messages.length);
    } while (randomIndex === lastMessageIndex);

    return randomIndex;
  }

  /* セリフを表示する */
  function showRandomMessage() {
    const randomIndex = getRandomMessageIndex();
    lastMessageIndex = randomIndex;
    messageDisplay.innerText = messages[randomIndex];
  }

  /* 1分ごとにセリフを更新するループ開始 */
  function startMessageLoop() {
    if (messageIntervalId) return;

    messageIntervalId = setInterval(() => {
      if (!isRunning) return;
      showRandomMessage();
    }, 60000);
  }

  /* セリフ更新ループ停止 */
  function stopMessageLoop() {
    clearInterval(messageIntervalId);
    messageIntervalId = null;
  }

  /* 前回と同じ曲を避けながらランダムに選ぶ */
  function getRandomTrackIndex() {
    if (tracks.length === 1) return 0;

    let randomIndex;
    do {
      randomIndex = Math.floor(Math.random() * tracks.length);
    } while (randomIndex === currentTrackIndex);

    return randomIndex;
  }

  /* 曲名表示を更新する */
  function updateTrackName(index) {
    const trackName = tracks[index].replace(".mp3", "");
    trackNameDisplay.innerText = "現在の曲：" + trackName;
  }

  /* ランダムな曲を再生する */
  function playRandomTrack() {
    const randomIndex = getRandomTrackIndex();
    currentTrackIndex = randomIndex;
    music.src = tracks[randomIndex];
    updateTrackName(randomIndex);
    music.play().catch(() => {});
    startVisualizer();
  }

  /* 曲が終わったら次の曲へ */
  music.addEventListener("ended", () => {
    if (isRunning) {
      playRandomTrack();
    }
  });

  /* 通知はオーバーレイだけ使う */
  function notifyModeChange(text) {
    showNotice(text);
    playBell();
  }

  /* 作業終了 / 休憩終了時の処理 */
  function finishCurrentMode() {
    stopTimer();

    if (isWorkMode) {
      isWorkMode = false;
      remainingTime = BREAK_TIME;
      messageDisplay.innerText = "おつかれさま。少し休もうか。";
      lastMessageIndex = -1;
      notifyModeChange("作業終了！ 5分休憩です。");
    } else {
      isWorkMode = true;
      remainingTime = WORK_TIME;
      messageDisplay.innerText = "それじゃ、またゆっくり始めよう。";
      lastMessageIndex = -1;
      notifyModeChange("休憩終了！ 作業を再開しましょう。");
    }

    updateModeDisplay();
    updateTimerDisplay();
  }

  /* 残り時間を計算して表示する */
  function tickTimer() {
    if (!isRunning || endTime === null) return;

    const now = Date.now();
    const diffMs = endTime - now;
    remainingTime = Math.max(0, Math.ceil(diffMs / 1000));

    updateTimerDisplay();

    if (remainingTime <= 0) {
      finishCurrentMode();
    }
  }

  /* タイマー開始 */
  function startTimer() {
    if (isRunning) return;

    isRunning = true;
    timerButton.innerText = "タイマー停止";
    endTime = Date.now() + remainingTime * 1000;

    if (music.paused) {
      if (!music.src) {
        playRandomTrack();
      } else {
        music.play().catch(() => {});
        startVisualizer();
      }
    }

    startMessageLoop();

    tickTimer();
    intervalId = setInterval(tickTimer, 250);
  }

  /* タイマー停止 */
  function stopTimer() {
    clearInterval(intervalId);
    intervalId = null;

    if (isRunning && endTime !== null) {
      const diffMs = endTime - Date.now();
      remainingTime = Math.max(0, Math.ceil(diffMs / 1000));
    }

    isRunning = false;
    endTime = null;
    timerButton.innerText = "タイマー開始";

    music.pause();
    stopMessageLoop();
    stopVisualizer();
    updateTimerDisplay();
  }

  /* 開始と停止を切り替える */
  function toggleTimer() {
    if (isRunning) {
      stopTimer();
    } else {
      startTimer();
    }
  }

  /* タイマーと音楽を初期状態に戻す */
  function resetTimer() {
    stopTimer();

    isWorkMode = true;
    remainingTime = WORK_TIME;
    endTime = null;
    lastMessageIndex = -1;
    currentTrackIndex = -1;

    updateModeDisplay();
    updateTimerDisplay();
    showRandomMessage();

    music.pause();
    music.currentTime = 0;
    music.removeAttribute("src");
    music.load();

    trackNameDisplay.innerText = "現在の曲：未再生";
    noticeOverlay.style.display = "none";
  }

  /* タブに戻ってきた時に時間表示を更新 */
  document.addEventListener("visibilitychange", () => {
    if (isRunning) {
      tickTimer();
    }
  });

  /* 初期設定 */
  bell.volume = 0.6;
  updateModeDisplay();
  updateTimerDisplay();
  showRandomMessage();

  /* 今日の日付を表示する */
  function updateDate() {
    const now = new Date();

    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');

    const week = ["日", "月", "火", "水", "木", "金", "土"];
    const dayOfWeek = week[now.getDay()];

    const text = `${year}/${month}/${day}（${dayOfWeek}）`;

    document.getElementById("dateText").innerText = text;
  }

  updateDate();  

  /* ビジュアライザー本体を取得 */
  const visualizer = document.getElementById("visualizer");

  /* ビジュアライザー開始 */
  function startVisualizer() {
    visualizer.classList.remove("paused");
  }

  /* ビジュアライザー停止 */
  function stopVisualizer() {
    visualizer.classList.add("paused");
  }
  
</script>

</body>
</html>
