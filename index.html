<!DOCTYPE html>
<html lang="ja">

  <head>

    <!-- ==================================================
    head：ページの基本設定
    ================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nook: Quiet Talk</title>
    <meta name="robots" content="noindex">


    <!-- ==================================================
    CSS：見た目の設定
    ================================================== -->
  <style>
  /* ==================================================
  0. CSS変数
  ================================================== */
  :root {
    --button-bg: rgba(255,255,255,0.30);
    --button-text: #24313a;
    --popup-button-bg: rgba(255,255,255,0.30);
    --space: 8px; 
  }

  /* ==================================================
  1. ページ全体
  ================================================== */

  body {
    background: #bfcfda;
    color: #fff;
    text-align: center;
    font-family: sans-serif;
    padding-top: 50px;
    margin: 0;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 10px;
  }

  h1 span {
    font-size: 18px;
    letter-spacing: 0.15em;
    opacity: 0.8;
}

  /* ==================================================
  2. ボタン・入力系
  ================================================== */

  button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: var(--button-bg);
    color: var(--button-text);
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transition: filter 0.2s ease, transform 0.1s ease;
  }

#clearBox button {
  font-size: 18px;
  white-space: nowrap;
  text-align: center;
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 10px auto;
}

  button:hover {
    filter: brightness(0.92);
  }

  button:active {
    filter: brightness(0.85);
  }

  /* 黒テーマのポップアップ内だけ、hover時に明るくする */
  .dark-popup button:hover {
    filter: brightness(1.25);
  }

  /* 黒テーマのポップアップ内だけ、押したときも少し明るくする */
  .dark-popup button:active {
    filter: brightness(1.1);
  }

/* 黒テーマのときだけ、ボタンを白っぽくする */
body.dark-theme button:hover {
  background: rgba(255,255,255,0.18) !important;
}

body.dark-theme button:active {
  background: rgba(255,255,255,0.24) !important;
}

  /* タイマー設定ポップアップ内のボタン背景 */
  #timerSettingBox.dark-popup button {
    background: var(--popup-button-bg);
  }

  input[type="range"] {
    width: 200px;
  }

  /* キーワード入力欄 */
  #keywordInput {
    width: 100%;
    box-sizing: border-box;
    font-size: 18px;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  /* ==================================================
  3. レイアウト系
  ================================================== */

  /* 画像とセリフ枠をまとめたエリア */
  #imageArea {
    width: 80%;
    max-width: 600px;
    margin: var(--space) auto 0;
  }

  /* 左パネルと右パネルを並べるエリア */
  #controlRow {
    width: 80%;
    max-width: 600px;
    margin: var(--space) auto 0;
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: stretch;
    flex-wrap: wrap;
  }

  /* テーマボタン・ビジュアライザー・曲名の横並びエリア */
#buttonRow {
  margin: var(--space) auto 0;
  width: 80%;
  max-width: 600px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0;
  box-sizing: border-box;
}

#buttonGroup {
  display: flex;
  gap: 20px;
  flex: 1;
}

#buttonGroup button {
  flex: 1;
  margin: 0;
  font-size: 16px;
  padding: 12px 0;
  white-space: nowrap;
}

#visualizer {
  flex-shrink: 0;
}

#trackName {
  flex-shrink: 0;
}
  /* ==================================================
  4. 画像・セリフ表示
  ================================================== */

  /* メイン画像 */
  #mainImage {
    width: 100%;
    display: block;
    border-radius: 10px;
    opacity: 1;
    filter: none;
  }

  /* セリフ枠 */
  #messageBox {
    margin-top: var(--space);
    padding: 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    box-sizing: border-box;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
  }

#messageBox {
  position: relative;
  cursor: default;
}

#messageBox.has-next {
  cursor: pointer;
  transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
}

#messageBox.has-next:hover {
  background: rgba(255,255,255,0.18) !important;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28) !important;
}

#messageBox.has-next:active {
  background: rgba(255,255,255,0.24) !important;
  transform: scale(0.99);
}

#messageBox.has-next::after {
  content: "▶";
  position: absolute;
  right: 14px;
  bottom: 8px;
  font-size: 14px;
  opacity: 0.75;
  animation: nextArrowBlink 1.2s ease-in-out infinite;
}

#messageBox.has-end {
  cursor: pointer;
}

#messageBox.has-end::after {
  content: "↺";
  position: absolute;
  right: 14px;
  bottom: 4px;
  font-size: 20px;
  opacity: 0.75;
  animation: nextArrowBlink 1.2s ease-in-out infinite;
}

@keyframes nextArrowBlink {
  0%, 100% {
    opacity: 0.35;
    transform: translateX(0);
  }

  50% {
    opacity: 0.9;
    transform: translateX(3px);
  }
}

  /* 会話1組ぶん */
  .dialogLine {
    margin-bottom: 4px;
    margin-top: 0;
  }

  /* 最後の行だけ下余白なし */
  .dialogLine:last-child {
    margin-bottom: 0;
  }

  .dialogLine.center {
    text-align: center;
  }

  .dialogLine.left {
    text-align: left;
    padding-left: 12px;   /* ← 内側に寄せる */
  }

  .dialogLine.right {
    text-align: right;
    padding-right: 12px;  /* ← 内側に寄せる */
  }

  /* 話者名 */
  .speaker {
    font-size: 18px;
    color: #b8c0ff;
    margin-bottom: 0px;
  }

  /* セリフ本文 */
  .line {
    font-size: 20px;
    color: #f2f2f2;
    line-height: 1.4;
    display: inline-block;
    max-width: 80%;
    min-height: 32px;
  }

.dialogLine {
  animation: dialogueFadeIn 0.8s ease forwards;
}

@keyframes dialogueFadeIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

  /* 曲名表示 */
  #trackName {
    font-size: 16px;
    margin-top: 0;
    color: #d6dcff;
    white-space: nowrap;
  }

  /* タイトル横の日付表示 */
  #dateText {
    font-size: 14px;
    margin-left: 12px;
    color: #d6dcff;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }

  /* ==================================================
  5. パネル表示
  左パネル / タイマーパネル
  ================================================== */

  /* パネル共通デザイン */
  .panel {
    flex: 1 1 240px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 18px 20px;
    box-sizing: border-box;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
  }

  /* 左右パネルの高さをそろえる */
  #focusPanel,
  #timerPanel {
    height: 146px;
  }

  /* キーワード入力欄を左パネルの中央に置く */
  #focusPanel {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* パネル見出し */
  .panelTitle {
    font-size: 18px;
    margin-bottom: 12px;
    color: #d6dcff;
  }

  /* 「今日の集中」用の大きめ見出し（今は未使用だが残しておく） */
  .panelTitle.focusTitle {
    font-size: 24px;
  }

  /* 今日の集中ゲージ（今は未使用だが残しておく） */
  #focusMeter {
    font-size: 32px;
    letter-spacing: -3px;
    margin-top: 8px;
  }

  /* 判定結果表示用（今は未使用だが残しておく） */
  #keywordResult {
    margin-top: 10px;
    font-size: 14px;
    color: #d6dcff;
    min-height: 20px;
  }

  /* タイマーパネル全体 */
  #timerPanel {
    cursor: pointer;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }

  /* タイマーパネルにマウスを乗せたとき */
  #timerPanel:hover {
    background: rgba(255,255,255,0.18) !important;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28) !important;
  }

  /* タイマーパネルを押したとき */
  #timerPanel:active {
    background: rgba(255,255,255,0.24) !important;
    transform: scale(0.99);
  }

  /* モード表示 */
  #mode {
    font-size: 24px;
    margin-top: 0;
    color: #d6dcff;
  }

  /* タイマー本体の数字 */
  #timer {
    font-size: 48px;
    margin-top: 10px;
    font-weight: bold;
  }

  /* ==================================================
  6. 通知・ポップアップ
  ================================================== */

  /* オーバーレイ通知全体 */
  #noticeOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    padding: 20px;
    box-sizing: border-box;
  }

  #clearOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10002;
    padding: 20px;
    box-sizing: border-box;
  }

  #clearBox {
    background: #2b2b44;
    color: #ffffff;
    border-radius: 16px;
    padding: 28px 24px;
    width: 90%;
    max-width: 460px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    box-sizing: border-box;
  }

  #clearText {
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 20px;
    color: #ffffff;
  }

  /* オーバーレイの中の箱 */
  #noticeBox {
    background: #2b2b44;
    color: #ffffff;
    border-radius: 16px;
    padding: 28px 24px;
    width: 90%;
    max-width: 460px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    box-sizing: border-box;
  }

  /* オーバーレイに出る文字 */
  #noticeText {
    font-size: 20px;
    line-height: 1.6;
    margin-bottom: 20px;
    white-space: pre-line;
    color: #ffffff;
  }

#creditOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10003;
  padding: 20px;
  box-sizing: border-box;
}

#creditBox {
  background: #2b2b44;
  color: #ffffff;
  border-radius: 16px;
  padding: 28px 24px;
  width: 90%;
  max-width: 460px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  box-sizing: border-box;
}

#creditTitle {
  font-size: 24px;
  margin-bottom: 18px;
}

#creditText {
  font-size: 15px;
  line-height: 1.8;
  text-align: left;
  margin-bottom: 20px;
}

#creditBox button {
  display: block;
  width: 100%;
  max-width: 260px;
  margin: 10px auto 0;
}


  /* ==================================================
  7. ロック画面
  ================================================== */

  /* ロック画面全体 */
  #lockScreen {
    position: fixed;
    inset: 0;
    background: #1e1e2f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 20px;
    box-sizing: border-box;
  }

  /* ロック画面の見出し */
  #lockScreen h2 {
    margin-bottom: 20px;
    font-size: 28px;
  }

  /* パスワード入力欄 */
  #passwordInput {
    font-size: 18px;
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    width: 260px;
    max-width: 80%;
    box-sizing: border-box;
  }

  /* パスワードエラー表示 */
  #errorMessage {
    color: #ff9b9b;
    margin-top: 12px;
    min-height: 24px;
  }

  /* アプリ本体。最初は非表示 */
  #appContent {
    display: none;
  }

  /* ==================================================
  8. フェードインアニメーション
  ================================================== */

  /* フェードイン用クラス */
  .fade-in {
    animation: fadeIn 1.5s ease-in;
  }

  /* 初回表示用（ゆっくり） */
  .fade-in-long {
    animation: fadeIn 1.5s ease-in;
  }

  /* 切り替え用（少し速い） */
  .fade-in-short {
    animation: fadeIn 0.6s ease-in;
  }

  /* フェードインの動き */
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ==================================================
  9. ビジュアライザー関連
  ================================================== */

  /* ビジュアライザー本体 */
  #visualizer {
    margin-right: 0;
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 30px;
  }

  /* 棒1本ごとの見た目 */
  #visualizer span {
    width: 4px;
    height: 6px;
    background: #d6dcff;
    border-radius: 2px;
    animation-name: bounce;
    animation-duration: 1s;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
  }

  /* 棒ごとに開始タイミングを少しずらす */
  #visualizer span:nth-child(1) { animation-delay: 0.2s; }
  #visualizer span:nth-child(2) { animation-delay: 0s; }
  #visualizer span:nth-child(3) { animation-delay: 0.5s; }
  #visualizer span:nth-child(4) { animation-delay: 0.6s; }
  #visualizer span:nth-child(5) { animation-delay: 0.3s; }

  /* 停止中は棒を動かさない */
  #visualizer.paused span {
    animation: none;
    height: 6px;
  }

  /* 棒が伸び縮みする通常の動き */
  @keyframes bounce {
    0%, 100% { height: 6px; }
    50% { height: 28px; }
  }

  /* 音量が下がっているときは小さく動かす */
  #visualizer.low-volume span {
    animation-name: bounce-low;
  }

  /* 通知中の小さい動き */
  @keyframes bounce-low {
    0%, 100% { height: 6px; }
    50% { height: 14px; }
  }

  /* ==================================================
  10. タイマー設定ポップアップ
  ================================================== */

  /* ポップアップ全体 */
  #timerSettingOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10001;
    padding: 20px;
    box-sizing: border-box;
  }

  /* ポップアップの箱 */
  #timerSettingBox {
    background: #2b2b44;
    color: #ffffff;
    border-radius: 16px;
    padding: 28px 24px;
    width: 90%;
    max-width: 460px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    box-sizing: border-box;
  }

  /* ポップアップタイトル */
  #timerSettingTitle {
    font-size: 24px;
    margin-bottom: 20px;
  }

  /* 1行ごとの入力エリア */
  .settingRow {
    margin-bottom: 16px;
    text-align: left;
  }

  /* ラベル */
  .settingRow label {
    display: block;
    margin-bottom: 8px;
  }

  /* 入力欄 */
  .settingRow input {
    width: 100%;
    box-sizing: border-box;
    font-size: 18px;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
  }

  /* ポップアップ内のボタン群 */
  .timerSettingButtons {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .timerSettingButtons button {
    flex: 1;
    text-align: center;
  }

  /* 作業中・休憩中の操作エリア全体 */
  #timerActionButtons {
    width: 100%;
  }

  /* 作業中・休憩中の3ボタンを並べる専用エリア */
  .timerActionButtonList {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  /* 3ボタン本体 */
  .timerActionButtonList button {
    display: block;
    width: 100%;
    margin: 0;
    min-width: 0;
    box-sizing: border-box;
    white-space: nowrap;
  }

  /* 閉じるボタンの行 */
  .timerCloseRow {
    width: 100%;
    margin-top: 14px;
  }

  /* 閉じるボタン */
  .timerCloseRow button {
    display: block;
    width: 100%;
    margin: 0;
    min-width: 0;
    box-sizing: border-box;
  }

  /* ==================================================
  11. スマホ向け調整
  ================================================== */
  @media (max-width: 768px) {

    body {
      padding-top: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 14px;
    }

    #dateText {
      display: inline-block;
      margin-left: 8px;
      font-size: 12px;
    }

    #imageArea,
    #controlRow,
    #buttonRow {
      width: 94%;
      max-width: none;
    }

    #imageArea {
      margin-top: var(--space);
    }

    #controlRow {
      margin: var(--space) auto 0;
    }

    #buttonRow {
      margin: var(--space) auto 0;
    }

    #controlRow {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
    }

    #mainImage {
      border-radius: 12px;
    }

    #messageBox {
      padding: 8px;
    }

    /* スマホでは本文を少し小さくし、幅も広げる */
    .line {
      font-size: 18px;
      max-width: 96%;
    }

    /* スマホでは2つのパネルを無理やり横並びに保つ */
    #controlRow {
      width: 94%;
      max-width: none;
      margin: var(--space) auto 0;
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
    }

    .panel {
      flex: 1 1 0;
      min-width: 0;
      padding: 14px 10px;
    }

    .panelTitle {
      font-size: 16px;
    }

    .panelTitle.focusTitle {
      font-size: 18px;
    }

    #focusMeter {
      font-size: 28px;
      letter-spacing: -2px;
    }

    #mode {
      font-size: 18px;
    }

    #timer {
      font-size: 34px;
    }

    input[type="range"] {
      width: 100%;
      max-width: 100%;
    }

    #trackName {
      font-size: 15px;
      opacity: 0.85;
      letter-spacing: 0.03em;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #buttonRow {
      gap: 10px;
      align-items: center;
    }

    #buttonGroup {
      flex: 1;
      gap: 6px;
    }

    #buttonGroup button {
      font-size: 14px;
      padding: 10px 6px;
      margin: 0;
    }

    #visualizer {
      margin-right: 0;
      margin-left: 4px;
      gap: 3px;
      height: 24px;
      flex-shrink: 0;
    }

    #visualizer span {
      width: 3px;
    }

    #focusPanel,
    #timerPanel {
      height: 118px;
    }

    #keywordInput {
      font-size: 16px;
      padding: 8px 10px;
    }
  }

@media (max-width: 380px) {
  .line {
    font-size: 16px;
  }
}


  /* ==================================================
  12. エンディング演出
  ================================================== */

  #endingWhiteout {
    position: fixed;
    inset: 0;
    background: #ffffff;
    opacity: 0;
    pointer-events: none;
    z-index: 20000;
    transition: opacity 4s ease;
  }

  #endingWhiteout.active {
    opacity: 1;
  }


#keywordFoundEffect {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(0, 0, 0, 0.5);
  pointer-events: none;

  opacity: 0;
  z-index: 9999;
}

#keywordFoundEffect img {
  max-width: 90%;
  width: 480px;
}

#keywordFoundEffect.show {
  animation: keywordFoundBackground 2.0s ease forwards;
}

#keywordFoundEffect.show img {
  animation: keywordFoundImage 2.0s ease forwards;
}

@keyframes keywordFoundBackground {
  0% {
    opacity: 0;
  }

  20% {
    opacity: 1;
  }

  70% {
    opacity: 1;
  }

  100% {
    opacity: 0;
  }
}

@keyframes keywordFoundImage {
  0% {
    transform: scale(0.85) translateY(10px);
  }

  20% {
    transform: scale(1.05) translateY(0);
  }

  70% {
    transform: scale(1) translateY(0);
  }

  100% {
    transform: scale(1) translateY(-18px);
  }
}

.headphone {
  display: inline-block;
  animation: floatHeadphone 3.2s ease-in-out infinite;
}

@keyframes floatHeadphone {
  0% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-5px);
  }

  100% {
    transform: translateY(0);
  }
}

  </style>
</head>

<body>

        /* 残り時間を計算して表示する */
/*
タイマーの心臓部。
現在時刻と終了予定時刻から、残り時間を毎回計算する。
ブラウザが一時停止してもズレにくい。
*/
function tickTimer() {
  if (!timerState.isRunning || timerState.endTime === null) return;

  const now = Date.now();
  const diffMs = timerState.endTime - now;
  timerState.remainingTime = Math.max(0, Math.ceil(diffMs / 1000));

  updateTimerDisplay();

  if (timerState.remainingTime <= 0) {
    finishCurrentMode();
  }
}

        /* タイマー開始 */
        /*
タイマーを開始・再開する。
終了予定時刻 endTime を作って、tickTimer() を定期実行する。
*/
function startTimer(showMessage = true) {
  if (timerState.isRunning) return;

  timerState.isRunning = true;
  timerState.isPaused = false;
  timerState.endTime = Date.now() + timerState.remainingTime * 1000;

  updateModeDisplay();
if (showMessage) {
  showRandomMessage();
}

  if (music.paused) {
    if (!music.src) {
      playRandomTrack();
    } else {
      music.play().catch(() => {});
      startVisualizer();
    }
  }

  startMessageLoop();

  tickTimer();
  intervalId = setInterval(tickTimer, 250);
}

      /* タイマー停止 */
      function stopTimer() {
  clearInterval(intervalId);
  intervalId = null;

  if (timerState.isRunning && timerState.endTime !== null) {
    const diffMs = timerState.endTime - Date.now();
    timerState.remainingTime = Math.max(0, Math.ceil(diffMs / 1000));
  }

  timerState.isRunning = false;
  timerState.endTime = null;

  music.pause();
  stopMessageLoop();
  stopVisualizer();
  updateTimerDisplay();
}

      /* 時間切れ時専用の停止
      タイマーは止めるが、音楽は止めない */
function stopTimerForNotice() {
  clearInterval(intervalId);
  intervalId = null;

  if (timerState.isRunning && timerState.endTime !== null) {
    const diffMs = timerState.endTime - Date.now();
    timerState.remainingTime = Math.max(0, Math.ceil(diffMs / 1000));
  }

  timerState.isRunning = false;
  timerState.endTime = null;

  /* 音楽は止めない */
  stopMessageLoop();
  updateTimerDisplay();
}

      /* 今のモードを強制終了する */
/*
「作業終了」「休憩終了」ボタン用。
終了予定時刻を今にして、自然な時間切れとして処理する。
*/
function skipCurrentMode() {
  timerState.endTime = Date.now();
  tickTimer();
}

      /* タイマーと音楽を初期状態に戻す */
      /*
タイマーと音楽を初期状態に戻す。
現在は通常画面へのリセット用として残している。
*/
function resetTimer() {
        stopTimer();

        timerState.mode = "idle";
        timerState.isRunning = false;
        timerState.isPaused = false;
        timerState.remainingTime = WORK_TIME;
        timerState.endTime = null;

        lastMessageIndex = -1;
        currentTrackIndex = -1;
        lastWorkEndIndex = -1;
        sessionCount = 0;

        updateModeDisplay();
        updateTimerDisplay();
        updateFocusDisplay();
        showIdleMessage();
        mainImage.src = IDLE_IMAGE;

        music.pause();
        music.currentTime = 0;
        music.removeAttribute("src");
        music.load();

        trackNameDisplay.innerText = "No track";
        noticeOverlay.style.display = "none";

        visualizer.classList.remove("low-volume");
        music.volume = normalVolume;
      }

      /* 一時停止
      タイマー・音楽・ビジュアライザーを止める */
function pauseTimerOnly() {
  clearInterval(intervalId);
  intervalId = null;

  if (timerState.isRunning && timerState.endTime !== null) {
    const diffMs = timerState.endTime - Date.now();
    timerState.remainingTime = Math.max(0, Math.ceil(diffMs / 1000));
  }

  timerState.isRunning = false;
  timerState.isPaused = true;
  timerState.endTime = null;

  music.pause();
  stopMessageLoop();
  stopVisualizer();

  updateTimerDisplay();
}

      /* ==================================================
      20. 補助表示関連
      ================================================== */

      /* 今日の日付を表示する */
      function updateDate() {
        const now = new Date();

        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');

        const week = ["日", "月", "火", "水", "木", "金", "土"];
        const dayOfWeek = week[now.getDay()];

        const text = `${year}/${month}/${day}（${dayOfWeek}）`;

        document.getElementById("dateText").innerText = text;
      }

      /* 今日の集中メーターを更新する
      今は左パネルを別用途に使っているが、機能自体は残してある */
      function updateFocusDisplay() {
        const focusMeter = document.getElementById("focusMeter");
        if (!focusMeter) return;

        const filled = "■".repeat(Math.min(sessionCount, SESSION_GOAL));
        const empty = "□".repeat(Math.max(SESSION_GOAL - sessionCount, 0));

        focusMeter.innerText = filled + empty;
      }

      /* ==================================================
      21. ページ表示状態の変化
      ================================================== */

      /* タブに戻ってきた時に時間表示を更新 */
      document.addEventListener("visibilitychange", () => {
          if (timerState.isRunning) {
            tickTimer();
          }
        });

        /* ==================================================
        22. 初期設定
        ページを開いた直後に一度だけ実行する
        ================================================== */

        /* ベル音の初期音量 */
        bell.volume = 0.5;

        /* 初回表示を画面に反映 */
        updateModeDisplay();
        updateTimerDisplay();
        updateFocusDisplay();
        updateDate();

        showIdleMessage();
        mainImage.src = IDLE_IMAGE;

applyTheme(themes[currentTheme]);

if (localStorage.getItem("endingReached") === "true") {
  isEnding = true;

  mainImage.src = ENDING_IMAGE;
  showDialogue(endingDialogue);

  music.src = ENDING_BGM;
  music.volume = normalVolume;
  music.loop = true;
  trackNameDisplay.innerText = "Nothing";

  document.body.addEventListener("click", () => {
    music.play().then(() => {
      startVisualizer();
    }).catch(() => {});
  }, { once: true });

  const timerPanel = document.getElementById("timerPanel");
  timerPanel.style.cursor = "default";
  timerPanel.style.pointerEvents = "none";

  stopVisualizer();
}


function showKeywordFoundEffect() {
  const effect = document.getElementById("keywordFoundEffect");

  if (!effect) return;

  effect.classList.remove("show");

  void effect.offsetWidth;

  effect.classList.add("show");

  setTimeout(() => {
    effect.classList.remove("show");
  }, 2000);
}
