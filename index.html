<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Lo-fi 作業アプリ</title>
<meta name="robots" content="noindex">

<style>
  body {
    background: #1e1e2f;
    color: #fff;
    text-align: center;
    font-family: sans-serif;
    padding-top: 50px;
    margin: 0;
  }

  button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: #6c7ae0;
    color: white;
    cursor: pointer;
  }

  #imageArea {
    width: 80%;
    max-width: 600px;
    margin: 20px auto 0;
  }

  #mainImage {
    width: 100%;
    border-radius: 10px;
  }

  #messageBox {
    margin-top: 10px;
    padding: 16px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
  }

  #trackName { margin-top: 20px; }
  #mode { font-size: 24px; margin-top: 24px; }
  #timer { font-size: 48px; margin-top: 10px; }

  #noticeOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
  }

  #noticeBox {
    background: #2b2b44;
    padding: 20px;
    border-radius: 10px;
  }

  #lockScreen {
    position: fixed;
    inset: 0;
    background: #1e1e2f;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  #appContent { display: none; }
</style>
</head>

<body>

<div id="lockScreen">
  <h2>🔒 パスワード</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">入る</button>
</div>

<div id="noticeOverlay">
  <div id="noticeBox">
    <div id="noticeText"></div>
    <button onclick="closeNoticeAndStartNext()">閉じる</button>
  </div>
</div>

<div id="appContent">

<h1>🎧 Lo-fi 作業アプリ</h1>

<div id="imageArea">
  <img src="image.png" id="mainImage">
  <div id="messageBox">
    <div id="message"></div>
  </div>
</div>

<audio id="music"></audio>
<audio id="bell" src="bell.mp3"></audio>

<div id="trackName"></div>

<br>

音量<br>
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="music.volume=this.value">

<div id="mode"></div>
<div id="timer"></div>

<button onclick="toggleTimer()" id="timerButton">開始</button>

</div>

<script>
const music = document.getElementById("music");
const bell = document.getElementById("bell");
const noticeText = document.getElementById("noticeText");
const noticeOverlay = document.getElementById("noticeOverlay");

const WORK = 30;
const BREAK = 30;
const PASSWORD = "storycat";

let time = WORK;
let endTime = null;
let isRunning = false;
let isWork = true;

function checkPassword(){
  if(passwordInput.value===PASSWORD){
    lockScreen.style.display="none";
    appContent.style.display="block";
  }
}

function playBell(){
  bell.currentTime=0;
  bell.play();
}

function update(){
  document.getElementById("timer").innerText =
    Math.floor(time/60)+":"+("0"+time%60).slice(-2);
}

function showNotice(text){
  noticeText.innerText=text;
  noticeOverlay.style.display="flex";
}

function closeNoticeAndStartNext(){
  noticeOverlay.style.display="none";
  startTimer();
}

function finish(){
  stopTimer();

  if(isWork){
    isWork=false;
    time=BREAK;
    showNotice("作業終了！");
  }else{
    isWork=true;
    time=WORK;
    showNotice("休憩終了！");
  }

  update();
}

function tick(){
  if(!isRunning) return;

  time = Math.max(0, Math.ceil((endTime-Date.now())/1000));
  update();

  if(time<=0){
    playBell();  // ←ここだけで鳴る
    finish();
  }
}

function startTimer(){
  if(isRunning) return;

  isRunning=true;
  endTime=Date.now()+time*1000;
  setInterval(tick,250);
}

function stopTimer(){
  isRunning=false;
}

function toggleTimer(){
  if(isRunning) stopTimer();
  else startTimer();
}

update();
</script>

</body>
</html>
