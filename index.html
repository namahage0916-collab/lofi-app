<!DOCTYPE html>
<html lang="ja">
<head>

<!-- ▼ 文字コード設定 -->
<meta charset="UTF-8">

<!-- ▼ ページタイトル（ブラウザのタブに表示） -->
<title>Lo-fi 作業アプリ</title>

<!-- ▼ 検索エンジンに表示させない -->
<meta name="robots" content="noindex">

<!-- =========================
     ▼ CSS（見た目のデザイン）
========================= -->
<style>

/* ▼ 全体の背景・文字設定 */
body {
  background: #1e1e2f;
  color: #fff;
  text-align: center;
  font-family: sans-serif;
  padding-top: 50px;
  margin: 0;
}

/* ▼ ボタンの見た目 */
button {
  font-size: 20px;
  padding: 10px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: #6c7ae0;
  color: white;
  cursor: pointer;

  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  transition: background 0.2s ease;
}

/* ▼ ボタンにマウスを乗せた時 */
button:hover {
  background: #5a68c0;
}

/* ▼ ボタンを押した瞬間 */
button:active {
  background: #4a57a8;
}

/* ▼ ボタン＋ビジュアライザーの横並び */
#buttonRow {
  margin: 10px auto 0;
  width: 80%;
  max-width: 600px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
}

/* ▼ ボタン同士の間隔 */
#buttonGroup {
  display: flex;
  gap: 10px;
}

/* ▼ ビジュアライザー（棒） */
#visualizer {
  margin-right: 10px;
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 30px;
}

/* ▼ 棒1本の見た目 */
#visualizer span {
  width: 4px;
  height: 6px;
  background: #d6dcff;
  border-radius: 2px;
  animation: bounce 1s infinite ease-in-out;
}

/* ▼ アニメーション（伸び縮み） */
@keyframes bounce {
  0%, 100% { height: 6px; }
  50% { height: 28px; }
}

/* ▼ 停止状態（動かない） */
#visualizer.paused span {
  animation: none;
  height: 6px;
}

</style>
</head>

<body>

<!-- =========================
     ▼ HTML（画面の構造）
========================= -->

<div id="appContent">

  <!-- ▼ タイトル -->
  <h1>
    🎧 Lo-fi 作業アプリ
    <span id="dateText"></span> <!-- 日付表示 -->
  </h1>

  <!-- ▼ 画像＋セリフ -->
  <div id="imageArea">
    <img src="image.png" id="mainImage">

    <div id="messageBox">
      <div id="messageName">Girl</div>
      <div id="message"></div>
    </div>
  </div>

  <!-- ▼ 音楽 -->
  <audio id="music"></audio>
  <audio id="bell" src="bell.mp3"></audio>

  <!-- ▼ 音量とタイマー -->
  <div id="controlRow">

    <div class="panel">
      <div>音量</div>
      <input type="range" min="0" max="1" step="0.01"
             oninput="setVolume(this.value)">
      <div id="trackName"></div>
    </div>

    <div class="panel">
      <div id="mode">作業時間</div>
      <div id="timer">25:00</div>
    </div>

  </div>

  <!-- ▼ ボタン＋ビジュアライザー -->
  <div id="buttonRow">

    <div id="buttonGroup">
      <button onclick="toggleTimer()">タイマー開始</button>
      <button onclick="resetTimer()">リセット</button>
    </div>

    <div id="visualizer" class="paused">
      <span></span><span></span><span></span>
      <span></span><span></span>
    </div>

  </div>

</div>

<!-- =========================
     ▼ JavaScript（動き）
========================= -->
<script>

/* ▼ 要素を取得（画面のパーツを操作するため） */
const music = document.getElementById("music");
const visualizer = document.getElementById("visualizer");

/* ▼ 音量調整 */
function setVolume(v) {
  music.volume = Number(v);
}

/* ▼ 音楽再生＋ビジュアライザー開始 */
function playMusic() {
  music.play();
  startVisualizer();
}

/* ▼ ビジュアライザー開始 */
function startVisualizer() {
  visualizer.classList.remove("paused");
}

/* ▼ ビジュアライザー停止 */
function stopVisualizer() {
  visualizer.classList.add("paused");
}

/* ▼ タイマー開始/停止 */
let isRunning = false;

function toggleTimer() {
  if (isRunning) {
    stopTimer();
  } else {
    startTimer();
  }
}

/* ▼ タイマー開始 */
function startTimer() {
  isRunning = true;
  playMusic();
}

/* ▼ タイマー停止 */
function stopTimer() {
  isRunning = false;
  music.pause();
  stopVisualizer();
}

/* ▼ リセット */
function resetTimer() {
  stopTimer();
}

</script>

</body>
</html>
