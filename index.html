<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Lo-fi 作業アプリ</title>
<meta name="robots" content="noindex">

<style>
  body {
    background: #1e1e2f;
    color: #fff;
    text-align: center;
    font-family: sans-serif;
    padding-top: 50px;
    margin: 0;
  }

  button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: #6c7ae0;
    color: white;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.9;
  }

  input[type="range"] {
    width: 200px;
  }

  #imageArea {
    width: 80%;
    max-width: 600px;
    margin: 20px auto 0;
  }

  #mainImage {
    width: 100%;
    display: block;
    border-radius: 10px;
    opacity: 0.95;
    filter: brightness(0.9) contrast(1.1);
  }

  #messageBox {
    margin-top: 10px;
    padding: 16px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
  }

  #messageName {
    font-size: 14px;
    color: #b8c0ff;
    text-align: left;
    margin-bottom: 8px;
  }

  #message {
    font-size: 20px;
    text-align: left;
    line-height: 1.6;
    min-height: 32px;
  }

  /* 横並びレイアウト */
  #controlRow {
    width: 80%;
    max-width: 600px;
    margin: 24px auto 0;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .panel {
    flex: 1 1 240px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .panelTitle {
    font-size: 18px;
    margin-bottom: 12px;
    color: #d6dcff;
  }

  #mode {
    font-size: 24px;
    color: #d6dcff;
  }

  #timer {
    font-size: 48px;
    margin-top: 10px;
    font-weight: bold;
  }

  /* 曲名表示（音量パネル内に配置） */
  #trackName {
    font-size: 16px;
    margin-top: 14px;
    color: #d6dcff;
    line-height: 1.5;
  }

  #buttonRow {
    margin-top: 24px;
  }

  #noticeOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10000;
  }

  #noticeBox {
    background: #2b2b44;
    border-radius: 16px;
    padding: 28px 24px;
    width: 90%;
    max-width: 460px;
  }

  #noticeText {
    font-size: 28px;
    margin-bottom: 20px;
  }

  #lockScreen {
    position: fixed;
    inset: 0;
    background: #1e1e2f;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  #passwordInput {
    font-size: 18px;
    padding: 10px;
  }

  #appContent {
    display: none;
  }
</style>
</head>

<body>

<div id="lockScreen">
  <h2>🔒 パスワードを入力</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">入る</button>
</div>

<div id="noticeOverlay">
  <div id="noticeBox">
    <div id="noticeText"></div>
    <button onclick="closeNoticeAndStartNext()">閉じる</button>
  </div>
</div>

<div id="appContent">

  <h1>🎧 Lo-fi 作業アプリ</h1>

  <div id="imageArea">
    <img src="image.png" id="mainImage">

    <div id="messageBox">
      <div id="messageName">Girl</div>
      <div id="message"></div>
    </div>
  </div>

  <audio id="music"></audio>
  <audio id="bell" src="bell.mp3"></audio>

  <!--
    ★変更点：
    曲名を音量パネルの中へ移動
  -->
  <div id="controlRow">
    <div class="panel">
      <div class="panelTitle">音量</div>

      <input type="range" min="0" max="1" step="0.01" value="1"
             oninput="setVolume(this.value)">

      <!-- 曲名ここ -->
      <div id="trackName">現在の曲：未再生</div>
    </div>

    <div class="panel">
      <div id="mode">作業時間</div>
      <div id="timer">25:00</div>
    </div>
  </div>

  <div id="buttonRow">
    <button id="timerButton" onclick="toggleTimer()">タイマー開始</button>
    <button onclick="resetTimer()">リセット</button>
  </div>

</div>

<script>
const music = document.getElementById("music");
const bell = document.getElementById("bell");
const trackNameDisplay = document.getElementById("trackName");

const tracks = ["Epoch.mp3","Barely.mp3","Notion.mp3"];

let currentTrackIndex = -1;

function setVolume(v) {
  music.volume = v;
  bell.volume = Math.min(v, 0.6);
}

function getRandomTrackIndex() {
  let i;
  do {
    i = Math.floor(Math.random()*tracks.length);
  } while(i === currentTrackIndex);
  return i;
}

function updateTrackName(i) {
  trackNameDisplay.innerText = "現在の曲：" + tracks[i].replace(".mp3","");
}

function playRandomTrack() {
  const i = getRandomTrackIndex();
  currentTrackIndex = i;
  music.src = tracks[i];
  updateTrackName(i);
  music.play();
}
</script>

</body>
</html>
